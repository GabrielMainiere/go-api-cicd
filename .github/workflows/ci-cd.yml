name: go-api-ci-cd

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ci:
    name: CI - Build, Test, Lint, Quality, SAST
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: appdb
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U appuser -d appdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgres://appuser:apppass@localhost:5432/appdb?sslmode=disable
      RUN_INTEGRATION_TESTS: "true"
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: go test -tags=integration ./...

      - name: Coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v6

      - name: SAST (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/ci

  container:
    name: Container - Lint, Build, Scan, Push
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: go-api-cicd:${{ github.sha }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: go-api-cicd:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Docker Hub Login
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and Push image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/go-api-cicd:latest
            ${{ env.DOCKERHUB_USERNAME }}/go-api-cicd:${{ github.sha }}

  deploy_hml:
    name: CD - Deploy Homolog + DAST
    if: github.ref == 'refs/heads/main'
    needs: container
    runs-on: ubuntu-latest
    env:
      RENDER_HML_DEPLOY_HOOK: ${{ secrets.RENDER_HML_DEPLOY_HOOK }}
      HML_APP_URL: ${{ secrets.HML_APP_URL }}
    steps:
      - name: Deploy Render Homolog
        if: ${{ env.RENDER_HML_DEPLOY_HOOK != '' }}
        run: curl -X POST "$RENDER_HML_DEPLOY_HOOK"

      - name: Wait for Homolog readiness
        if: ${{ env.HML_APP_URL != '' }}
        run: |
          for i in {1..30}; do
            if curl -fsS "$HML_APP_URL/users" > /dev/null; then
              echo "Homolog app is ready."
              exit 0
            fi
            echo "Attempt $i/30: app not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "Homolog app did not become ready in time."
          exit 1

      - name: DAST (OWASP ZAP Baseline)
        if: ${{ env.HML_APP_URL != '' }}
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ env.HML_APP_URL }}/users

  deploy_prod:
    name: CD - Deploy Production
    if: github.ref == 'refs/heads/main'
    needs: deploy_hml
    runs-on: ubuntu-latest
    env:
      RENDER_PROD_DEPLOY_HOOK: ${{ secrets.RENDER_PROD_DEPLOY_HOOK }}
      PROD_APP_URL: ${{ secrets.PROD_APP_URL }}
    environment:
      name: production
      url: ${{ env.PROD_APP_URL }}
    steps:
      - name: Deploy Render Production
        if: ${{ env.RENDER_PROD_DEPLOY_HOOK != '' }}
        run: curl -X POST "$RENDER_PROD_DEPLOY_HOOK"
